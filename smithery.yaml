startCommand:
  type: stdio
configSchema:
  type: object
  required:
    - codemeshProjectRoot
  properties:
    codemeshProjectRoot:
      type: string
      description: The absolute path to the local codebase you want to index
commandFunction: |-
  config => ({ command: 'node', args: ['dist/index.js'], env: { CODEMESH_PROJECT_ROOT: config.codemeshProjectRoot } })
